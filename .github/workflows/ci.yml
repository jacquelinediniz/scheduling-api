name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduling
          POSTGRES_PASSWORD: scheduling123
          POSTGRES_DB: scheduling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry==2.3.4

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run linter
        run: poetry run ruff check app/ tests/

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://scheduling:scheduling123@localhost:5432/scheduling_db
          SECRET_KEY: test-secret-key
          ENVIRONMENT: test
          DEBUG: "false"
        run: |
          poetry run pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60